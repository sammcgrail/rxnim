<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Chem-OCR logo">
  <title>Chem-OCR — chemistry recognized</title>
  <defs>
    <linearGradient id="rim" x1="0.1" y1="0.1" x2="0.9" y2="0.9">
      <stop offset="0%"   stop-color="#9ec5ff"/>
      <stop offset="55%"  stop-color="#6ea8fe"/>
      <stop offset="100%" stop-color="#3a78d4"/>
    </linearGradient>
    <radialGradient id="lens" cx="38%" cy="32%" r="80%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="55%"  stop-color="#6ea8fe" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6ea8fe" stop-opacity="0.02"/>
    </radialGradient>
  </defs>

  <!--
    Chemistry: phenol (hydroxybenzene), Kekulé notation. Regular hexagon C6
    with alternating double bonds drawn as inner parallel lines. -OH on top
    ring carbon (CPK red). Chosen Kekulé resonance form: double bonds on
    edges 1 (top-UR), 3 (LR-bot), 5 (LL-UL).

    Geometry:
      Centre  (95, 130), vertex radius 42.
      Vertices (CCW from top):
        top (95, 88), UR (131.37, 109), LR (131.37, 151),
        bottom (95, 172), LL (58.63, 151), UL (58.63, 109).
      Inner double-bond lines: displaced 7 px inward, shortened 7 px each end.
  -->

  <!-- ─── Phenol (Kekulé) ─── -->
  <g stroke="#eaeef4" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- C–O bond -->
    <line x1="95" y1="88" x2="95" y2="56"/>

    <!-- Hexagon outline -->
    <polygon points="95,88 131.37,109 131.37,151 95,172 58.63,151 58.63,109"/>

    <!-- Double-bond inner lines -->
    <g stroke-width="5">
      <!-- Edge 1: top → UR -->
      <line x1="97.56" y1="97.56" x2="121.81" y2="111.56"/>
      <!-- Edge 3: LR → bottom -->
      <line x1="121.81" y1="148.44" x2="97.56" y2="162.44"/>
      <!-- Edge 5: LL → UL (vertical) -->
      <line x1="65.63" y1="144" x2="65.63" y2="116"/>
    </g>
  </g>

  <!-- OH label -->
  <text x="95" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif"
        font-size="28" font-weight="700" letter-spacing="-1"
        fill="#e23d3d" text-anchor="middle">OH</text>

  <!-- ─── Magnifying glass ─── -->
  <g>
    <circle cx="178" cy="128" r="44" fill="url(#lens)"/>
    <circle cx="178" cy="128" r="44" stroke="url(#rim)" stroke-width="10"/>
    <line x1="209.11" y1="159.11" x2="232" y2="182"
          stroke="url(#rim)" stroke-width="12" stroke-linecap="round"/>
    <!-- Cleaner shine: a single bright curved arc on upper-left rim (~10
         o'clock to ~12), plus a tiny secondary glint. Reads as proper
         specular highlight, not a thumbprint smudge. -->
    <path d="M 146 113 A 36 36 0 0 1 168 96"
          stroke="#ffffff" stroke-opacity="0.55" stroke-width="5"
          fill="none" stroke-linecap="round"/>
    <circle cx="173" cy="103" r="2.4" fill="#ffffff" fill-opacity="0.55"/>
  </g>
</svg>
