services:
  rxnim:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rxnim
    restart: unless-stopped
    ports:
      # Bind to all interfaces so box-web's host.docker.internal can reach us
      # (matches the pattern of tonykudo, ringleader, mptodo on this box).
      - "20040:8000"
    volumes:
      # cache for huggingface_hub downloads + easyocr models so a rebuild
      # doesn't re-pull (improvement #3 from plan review)
      - rxnim_models:/root/.cache
    deploy:
      resources:
        limits:
          memory: 6G
    environment:
      # OpenRouter key for LLM-backed OCR refinement.  Read from host env at
      # `docker compose up` time — DO NOT hardcode.  /root/seb/.env exports
      # this via systemd seb.service environment, and `docker compose` will
      # honour it as long as the var is set in the shell at compose-up time.
      # The container falls back gracefully if unset (LLM_ENABLED=False).
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  rxnim_models:
